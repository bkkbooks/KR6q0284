body:
  text: 參學門人道勝圓淨録金粟沙門通乘重梓上堂問堂表白宣疏了師指法座云三世諸佛今古祖師盡在者裏轉大法輪了也却向諸人腳跟下過去還見麼若見眉毛眼睫常放光明若不見看看山僧步步入泥入水去也乃上座拈香此一瓣香祝延今上皇帝伏願聖躬萬歲萬萬歲帝業等乎山河鼎祚齊於天壤又拈香此一瓣香奉為闔國采僚文資武列伏願振謨猷乎遠大流勳業以綿長六軍常清萬姓永泰又拈香大衆此一瓣香古今無價佛祖不傳且道從什處得來還知落處麼若也知得祇者裏參見真善知識若也不知爇向爐中供養我先住楊岐後住雲蓋會和尚乃升座蔣山白槌云法筵龍象衆當觀第一義師乃顧衆云委悉麼若不委悉為蛇畫足去也古佛巖前千華競秀曹溪源上萬派歸流莫有陟𡾟嶮涉渺瀰者麼不顧危亡便請相見時有僧問昔日靈山一會迦葉親聞此日知府臨筵請師舉唱答紅日當空清風匝地僧云解吹無孔笛天下總聞聲答寒山撫掌拾得呵呵僧云若不泛舟焉知海闊答利動君子問承知府有言一言悟道猶成藥病之差不假一言如何接人答月似彎弓少雨多風僧云兔角杖頭挑日月龜毛拂子指乾坤答十字縱橫僧云香煙迥徹清霄外朝蓋光臨證祖機答踏破草鞋赤腳走新羅國裏問知音問善戰者不施寸刃今日當場如何決勝答看僧云猶是干戈相待答兩段不同僧云解帶却兵猶費力仰天長嘯未為功答相識滿天下僧云忽遇滿身鋒刃來又作麼生答喫棒得也未僧云洎合放過師拍膝一下僧便喝答作家僧擬議答鈍致殺人問昔年雲外人皆委今日中事若何答山僧愛瞋不愛喜僧云斬新日月特地乾坤答恰似不相逢僧云紫陵巖畔千華秀白玉樓前萬姓歌答未必心頭似口頭僧云作家宗師出世太晚答這箇衲僧世間罕有僧云也不消得師噓一聲問諸佛出世地布金蓮師今出世有何祥瑞答青天白日僧云五葉芬芳傳寶印三乘悟了化人天答截斷千山路衝開萬里關僧云金風遠布野老謳歌答在處有芳草僧云不登謝公船爭見釣魚手答心不負人面無慚色一僧禮拜了胡跪以手向懷中取物作呈似勢師左顧僧起立作獻物勢師右顧僧伸手作接物復安懷內師以手直下指僧擬議師云祇有這箇無那箇僧以手一劃答果然僧便歸衆師乃笑問朝貴殷勤伸三請鴻儒碩學盡光臨祖師西來端的意乞師方便指人心答鐵牛愛喫無根草僧云月輪光輝於此日時人盡唱太平歌答眼裏無筋一世貧僧云龍圖證明學人禮謝答放過一著乃云問答已周何不散去既不然者更引些葛藤向淨地上作一場狼藉去也正法眼藏亘古亘今祖祖密傳印印相可語言路絶思慮情忘一切羣生各具斯事然難信之法措者還稀上上之機方能湊泊若湊泊得去便與三世佛祖有情無情悉皆同參無他非前非後有何生死可出佛道可成不假多劫修行彈指悉皆具足行住坐臥任運施為見聞覺知隨緣應用睡來合眼飯來開口寒即向火熱即取凉既到者箇平實田地匹上不足匹下有餘若是祖宗門下客直須向火𦦨裏藏身微塵裏走馬東涌西沒同死同生爍迦羅眼不能窺千手大悲把不住裂破毗盧印掃盡衲僧蹤然雖如是劍閣路危終易度趙州關險大難行但仁勇生而且昧長又寡聞雖挹宗機擬終深藪比奉知府龍圖特垂台命闔府采僚同賜僉俞令某繼此道場實增忝幸敢將上善仰延宸算傍祝府僚伏願知府龍圖早升陛闕榮陟鼎槐運使郎中亟聞漕最殊被帝恩運判都官英聲遐播清職驟躋通判駕部闔府采僚理狀彌光亨衢驟進更願今辰席上外府尊官永心腹於王家常眷隆於釋寶又承僧職大師蔣山清凉和尚同垂象駕共建法筵諸多檀越惟願常臻福慶永賁佛乘乃云大化無為道太平閻浮日月轉分明豐年野老謳歌甚在處嘉禾合穗生久坐尊官伏惟珍重師在蔣山受小疏大衆集定僧呈法衣師捻起身上袈裟云大衆且道這箇是那箇是若道這箇是爭奈那箇何若道那箇是爭奈這箇何却顧衆云如今不免對大衆前改頭換面捻一放一去也便卸袈裟披法衣登座云風不來林不動下坡不走快便難逢有麼時有僧問金陵城下祖令當行如何是祖令當行師云爍電久於雲裏現忽雷今已震多時進云月輪光輝於此日也答照見肝膽進云莫道梁王不識達磨答時來天地皆同力問諸佛出世轉大法輪師今出世有何祥瑞答山青水緑進云學人未曉乞師再指答一陳風來一陳寒進云一等勿絃琴唯師彈得妙答且莫喚鐘作甕問久居巖谷即不問入化導事如何答真不掩僞進云恁麼則羣生有賴去也答曲直迥然分進云羣生已蒙師指示向上宗乘事若何答一人泉在最高峰進云四海共參真般若十方同用佛毗尼答三十年後明眼人前不得錯舉僧云府尹不虗伸請命學人禮拜謝師恩答分明記取僧問諸佛出世地布黃金人王出世以恩濟人和尚出世以何示人答南北山相對東西有路分僧云鍾阜峰前瑞氣發鳳皇臺畔祖風興答幾多遊賞客到此盡迷源僧云葵華偏向日逝水不回流答依稀似曲才堪聽又被吹將別調中進云大衆證明學人禮謝答禮拜直須頭點地師云莫更有問話者麼何妨出來結緣師乃云夫參學人直須具頂門上眼超世英雄於一切人天衆前震法雷擊法鼓藏鋒露刃掣鼓奪旗吼師子音作大佛事若能如是方有些子丈夫之氣山僧今日不惜眉毛入泥入水去也我佛世尊為一大事因緣出現於世敢問諸德作麼生是一大事良久云五千餘卷詮不盡三世諸佛讚不及今古祖師提不起還委悉麼若委悉去不動步超釋迦越彌勒又何必更令山僧向諸德前鼓兩片皮壓良為賤然雖如是不許夜行剛把火直須當道與人看乃云爐冶鉗鎚枉用工吹毛何必在磨礱靈光昨夜輝牛斗坐致升平宇宙中久立授帖日升座云莫有問話者麼僧便出師云等閒垂釣僧禮拜了畫一圓相師以右手拋向後僧又畫一圓相師以左手拋向後僧歸衆師云更有什麼僧無語師拍膝云龍頭蛇尾僧云賊過後張弓師乃笑復云明珠歷掌別者還稀寶鏡當臺何人鑒照鋒前一路截斷衆流言下千差隨波逐浪所以展則大千俱遍不展則絲髮不存與麼語話猶是化門之說且道不落化門一句作麼生道道泰不傳天子令時清休唱太平歌謝了又云千峰壁立滑於苔不惜眉毛露出來直下早逾千萬里那堪於此更徘徊喝一喝下座師入院迎到法堂前乃指座云大衆巍巍堂堂萬象難藏通上徹下誰敢承當遂登座云一二三才坐定顧衆云委悉麼若不委悉撒沙撒土去也迦葉門下水泄不通萬仞崖前凡聖路絶且道把住即是放行即是盡法無民有疑請問問答不録乃云欲升此座應須作禮須彌燈王且道須彌燈王在什處又向什處作禮為復心存意想為復緣慮俱忘為復心境一如為復萬法空寂若與麼見解未出常流既不與麼又作麼生棒打石人頭嚗嚗論實事直饒博聞強識世智辨聰得大總持具無礙辨於祖師門下轉勿交涉所以此事不可以有心求不可以無心得不可以語言造不可以寂默通非得失是非緇素貴賤凡聖差降情量智解之所能及諸人到者裏如何即是若是大丈夫兒直下真不掩僞最親切處自肯方親山僧與麼道已是相埋沒了也如今莫有不受人瞞者麼良久云平生肝膽向人傾相識猶如不相識遂拈杖云無限雲山藏不得却𢹂黎杖入鄽來千門萬戶俱敲遍今日分明卓鳳臺卓一下下座上堂拍禪牀云心外無法萬法唯心心既不生法從何立山河大地甚處得來三十年後忽有人問轉身句作麼生道良久云潼關雖易度劍閣轉難行參上堂一切法門無盡海同會一法道場中拈起杖云拄杖子遇寒則普天寒遇熱則普天熱且道不寒不熱一句作麼生道卓禪牀一下云明年大有新條在惱亂春風卒未休參上堂拈拄杖云千江月現萬派歸流長垂直鈎釣著鰲頭森羅萬象總在者裏如今賤賣與諸人還要麼若要堪作什麼若不要從教向大洋海裏興雲致雨作風作浪去也卓一卓乃喝下座問師唱誰家曲宗風嗣阿誰答行到水窮處坐看雲起時進云楊歧嫡子臨濟兒孫答千言萬語無人會又逐流鶯過短牆問如何是佛答近火先燋問如何是道答溺泥有刺進云如何是道中人答切忌踏著乃云心隨萬境轉轉處實能幽隨流認得性無喜亦無憂拍禪牀云保寧作一頭水牯牛去也還有相隨者麼若相隨得鼻孔在什處若相隨不得保寧自起自倒去也復云有意氣時添意氣不風流處也風流上堂一法有形翳汝眼睛眼睛不明世界崢嶸拈杖云見麼若見則遮却眼光若不見則失却拄杖且作麼生道得不受人瞞底句良久云平地未為嶮遠山焉足高卓拄杖下座上堂光陰倏忽寒暑迭遷不涉春緣道將一句來良久云始見去年九月九今年又見秋葉黃參上堂保寧乍住不曾停日日街頭巷尾行張三李四相逢著剔起眉毛作麼生拍手笑下座上堂拍禪牀云不是心亦非佛問君畢竟是何物昨夜金剛努目瞋一拳打破精靈窟喝一喝下座上堂滿口是舌都不能說碧眼老胡當門齒缺開爐上堂舉丹霞行腳到一院遇天寒遂將木佛燒火向院主叱罵丹霞乃院主眉鬚墮落大衆院主眉鬚墮落即且置且道丹霞眉毛在麼若也見得與古佛同參若也不見切忌撥無因果後有僧問天竺丹霞燒木佛意旨如何竺云寒即圍爐向暖火熱即竹林溪畔坐保寧也無木佛與諸人燒堂中自有無煙火要向即向要撥即撥且道與古人是同是別乃云上閒僧多下閒僧少上堂一人發真歸源十方虗空悉皆消殞拍禪牀云大衆為什麼却有人透者裏不過良久云自是不歸歸便得五湖煙景有誰爭上堂快馬一鞭快人一言直饒與麼猶是鈍漢乃召衆云喫茶去上堂釋迦掩室於摩竭已泄天機淨名杜口於毗耶特地饒舌少林九年面壁老不歇心永嘉一宿曹溪徒誇英俊保寧與麼道還有過也無路逢劍客方呈劍不是詩人不獻詩參上堂一塵入正受諸塵三昧起諸塵入正受一塵三昧起遂拈杖云保寧有時拈頭作尾有時拈尾作頭金剛腳底踣跳蟭螟眼裏藏身朝到西天暮歸東土即且置祇如不動步一句作麼生道卓拄杖云無事莫行偏僻路等閒惹得是非來參問如何是佛答鐵鎚無孔問如何是祖師西來意答雪上加霜發化主上堂盡十方世界為一大陳若聖若凡種種異類出此不得釋迦為主將文殊作先鋒普賢為殿後陳勢既圓且道與什人相見良久云定光金地遙招手智者江陵暗點頭遂拈拄杖云如今盡在保寧拄杖頭上開甘露門示真實相展縮無礙縱橫自由還見麼若也見得真不掩僞若也不見分付諸方化主一任將向南州北縣扶過斷橋水伴歸無月村卓一下下座上堂立春日打泥牛一棒兩棒千頭百頭雪華深覆辨不得頂門有眼徒悠悠拍手云囉囉哩惱亂春風卒未休上堂萬法是心光諸緣唯性曉本無迷悟人祇要今日了且道了底事作麼生良久云待得雪消去自然春到來上堂金毛師子一哮吼驚起法身藏北斗文殊普賢無處走碧眼也徒誇好手喝一喝下座上堂迦葉擎拳阿難合掌樓至如來全無伎倆常州廣福上堂師子窟中必無異獸莫有哮吼者麼有僧問遠離金陵丈室幸屆廣福道場向上宗乘請師舉唱答微風搖寶鐸紅日耀青天進云滿眸山色秀遍地野華新答白雲千里萬里進云大衆證明學人禮謝答多年曆日乃云保寧今日不免曲順人情舉些浸不爛底多年葛藤供養大衆去也塵塵爾剎剎爾山是山水是水彌勒不入樓閣善財不須彈指以手一劃云微塵世界氷消瓦解且道彌勒善財在什處若向者裏參徹去不妨在處稱尊若也不見客路如天遠侯門似海深回莊上堂記得鵝湖和尚一日點淨後不赴堂遂入方丈裏睡齊後知事來白云和尚何不赴堂鵝湖云莊上喫油糍來晚閒莊主到云今日謝和尚喫油糍大衆為復是師通妙用本體如然平地上剛然揑怪既不與麼又作麼生良久云者箇公案一任天下人批判保寧也無神通妙用亦無宿命他心院在江寧府莊屬宜興縣水路一千陸路四百孤舟野渡處處經過堤柳巖華時時閒發前月出去昨日歸來莊上也不曾喫他油糍祇是炊白米飯煮野菜羹療飽充飢隨家豐儉然雖如是更有一般堪笑事米中粒粒遍生蟲參上堂入荒田不揀信手拈來草觸目未嘗無臨機何不道乃云保寧今日為衆竭力入荒田去也拈拄杖云有時亦隨春生有時不逐夏長亦能殺人亦能活人殺人也醍醐上味翻成毒藥活人也一切毒藥皆是醍醐如今更不囊藏分明揭向諸人且道是醍醐是毒藥良久云無事莫將容易服古今曾誤幾人來卓一下下座上堂金陵故都鳳臺寶地諸上善人同會一處不顧釋迦遺教不待彌勒授記任他春去秋來管你鹽賤米貴二時展鉢開單說甚珍羞百味健即經行困即打睡祇聞有象王蹴踏焉知得師子遊戲拍禪牀云大衆溈山水牯牛今日五更失却鼻孔下座上堂橫按杖云雲從龍風從虎甘草甜黃連苦洪波浩渺浪滔天須彌頂上日卓午卓拄杖下座上堂如來明星現時成道大衆且道明星幾時不現上堂良久以手摑口云大多口生上堂譬如琴瑟箜篌琵琶雖有妙音若無妙指終不能發拈拄杖云者箇且非琴非瑟有大妙音衆中莫有妙指者麼試請一發看若無保寧自家品弄去也橫按杖云還聞麼良久云一堂風冷淡千古意分明上堂曹溪路上野老謳歌古佛堂前行人舞袖腳踏實地天下人知鼻孔遼天作麼生辨乃云無孔笛吹雲外曲五湖何處覓知音因長蘆和尚來上堂金將火試水將杖試大衆祇如金不將火試水不將杖試還有人辨得麼若辨得是真也假也深也淺也若辨不得且分付與明眼人上堂囫圇無縫誠謂難吞碎挫將來撈摝不上變生為熟須是當人五味調和全歸衆口衆口即且置且道誰是當人者若也知得長連牀上開單展鉢若也不知三十年後莫相辜負參問承古有言離相離名人不識吹毛用了急還磨以手劃云者箇即不問作麼生是用答王法無親僧便禮拜師便打僧云將軍自有嘉聲在答氷消瓦解上堂有頭無角有尾無腳十方世界何處安著金烏日日來消爍玉兔也被他吞却噓一聲下座上堂舉空可空非真空色可色非真色真色無形真空無名無名名之父無色色之母為萬法之根源作天地之太祖師云肇法師大殺盡力道未道得一半何故若於摩竭門下滿目光生祖師門下未夢見在且道祖師門下別有什長處乃云有智人前莫舉無智人前莫說上堂寅朝有粥齊時有飯展鉢開單光明燦爛行住坐臥無他一生大事成辦大衆且道與麼見解底人還得盡善也未良久云誰知更有離家子望斷碧雲生遠愁上堂保寧有一路東西徒指注直下已千差迥頭還錯誤不錯誤百尺竿頭須進步顧衆云前面有山兼有水一程分作兩程行上堂秋風凉松韻長未歸客思故鄉且道誰是未歸客何處是故鄉良久云長連牀上有粥有因施主上堂僧問雷音已震於沙界今日相逢事若何答久雨不晴僧云與麼則錦上添華答熏天炙地僧云起動和尚師便打乃云問既無盡答亦無窮若據祖宗門下本無如是事若於建化門中隨機施設亦大矣哉永嘉云嗟末法惡時世衆生薄福難調制去聖遠兮邪見深魔彊法弱多冤害永嘉與麼道且暫時閒曲順人情即不可千古之下要且遭人簡點何故且我家本無是事諸佛亦不曾出世亦無佛可成亦無法可說亦無衆生可度亦無煩惱可斷亦無菩提可求亦無涅槃可證亦無前際中際後際亦無正法像法末法於一切法求其實性皆不可得所以時亦不去來法亦不生滅不見道一切法不生一切法不滅若能如是解諸佛常現前所以長沙云盡十方世界是沙門一隻眼盡十方世界是沙門全身盡十方世界是箇真實人體盡十方世界是解脫門乃至佛及衆生有情無情有性無性皆同一體同一性同一相亦無內外中閒取捨愛憎斷常生滅染淨去來種種知解之所分別若能如是則三界不能收六道不能攝於一切處運用去來無住無著應物現形得大自在或凡或聖或是或非逆行順行天莫能測所以永嘉到者裏出手不得又記得本淨云道體本無修不修自合道弃却一真性來入閙浩浩若逢修道人第一莫向道實謂誠實之言保寧與麼也且隨方就圓然雖如是笑我者多哂我少上堂風聲浩浩觀音談不二法門春色依依遮那現無相境界鴈回沙塞鶯囀喬林長空飛白鶴之雲大野灑如膏之雨實謂頭頭顯煥處處發明拈拄杖云三世十方不離者裏噓一聲云眼睫眉毛都落盡不知何日更重生上堂舉三聖云我逢人即出出即不為人興化云我逢人即不出出即便為人此二尊宿與麼為人猶在半途保寧今日路見不平拈拄杖下座大衆一時走散擲却便歸方丈上堂天上無彌勒地下無彌勒打破太虗空如何尋不得垂下一足云大衆向什處去也上堂釋迦出世弄假像真達磨西來將長就短德山棒臨濟喝陽𦦨充饑梅林止渴清平世界不妨夜行如今莫有吞却佛祖打破化城者麼良久云保寧今日被大衆勘破上堂山僧二十餘年挑囊負鉢向寰海內參善知識十數餘人自家竝無箇見處有若頑石相似參底尊宿亦無長處可相利益自此一生祇做箇百無所解底人幸自可憐生忽被業風吹到江寧府無端被人上堂推向十字路頭住箇破院作粥飯主人接待南北事不獲已隨分有鹽有醋粥足飯足且與麼過時若是佛法不曾夢見便下座上堂至道無難唯嫌揀擇拈杖云保寧拄杖子一時穿却天下衲僧鼻孔了也卓一下下座上堂法身無相應物以形般若無知對緣而照上是天下是地佛殿對三門僧堂對廚庫拈杖云這箇是保寧拄杖子阿那箇是法身若向者裏透得過且向三家村裏東買西賣若也透不得過天下橫行猶未可金陵還有鳳臺關卓一下下座上堂昭昭於心目之閒而相不可覩拈起杖云還見麼若見又道不可覩晃晃於色塵之內而理不可分擊杖云還聞麼若聞又道不可分放開即易揑聚即難荊棘林中須知有出身之路試向七縱八橫處道將一句來衆無語乃云若不入水爭見長人上堂拈拄杖云人人盡道有箇黑漆底祇是用處不同在諸人分上豎窮三際橫遍十方指大地為黃金攪長河為酥酪在保寧手裏要橫不得橫要豎不得豎動著即喪覷著即瞎當與麼時忙忙之者普天匝地下座上堂大地北風吹長天霰雪飛今朝寒較殺身上更添衣大衆有衣則添無衣添箇什麼爐邊向火猶嫌冷更有樵夫跣足行上堂春雨如膏春風如刀填溝塞壑樹鳴條會麼魚行水濁鳥飛落毛上堂不可以智知不可以識識拈拄杖云大衆喚作什麼若喚作拄杖眉鬚墮落若不喚作拄杖陸地平沉試向不動纖毫處道將一句來良久云在家祇言為客易臨筌方覺取魚難卓一下下座上堂屈屈作什麼昨夜三更達磨大師一拳打落保寧當門齒問知師解把無星稱無角鐵牛重幾多答頭輕尾重僧云此猶是對面相瞞答與天下人作榜樣僧云恁麼則人平不語水平不流答猶較些子問靈山指月曹溪畫月未審保寧門下如何師云嗄僧云有華當面貼師便喝僧云鴛鴦繡了從教看莫把金針度與人答罕逢穿耳客大覺禪師來上堂同聲相應同氣相求定光招手智者點頭然雖如是也未免笑破他人口上堂唯一堅密身一切塵中現所以行住坐臥念念無生見聞覺知心心永寂善財童子於一念閒經過一百一十城參問五十三員善知識到了不離菩提道場普光明殿遮那彌勒步步相隨文殊普賢處處出現若向這裏見得諦去更須知有向上一路始得且向上一路又且如何吽吽下座上堂祖師門下絶人行深險過於萬丈坑垂手不能空費力任他堂上緑苔生上堂若說佛法供養大衆未免眉鬚墮落若說世法供養大衆入地獄如箭去此二途當說什麼三寸舌頭無用處一雙空手不成拳上堂拈杖喝云謾區區休碌碌無相光明常滿目短棹孤舟歸去來五湖四海煙波足擲拄杖下座上堂保寧門戶鎮長開毳侶憧憧去復來二水三山何處是直須親到鳳皇臺上堂嚙鏃之機猶是鈍當鋒點的未為親那吒十面千眸動無相靈光翳日輪喝一喝下座大平州瑞竹上堂主人命升此座為衆說法若論此座而無所升無所不升若論此法而無所說無所不說三世諸佛亦如是東西祖師亦如是諸人亦如是保寧亦如是既然如是誰是坐者誰是立者誰是說者誰是聽者若也會得已是頭上安頭若也不會一任斬頭覓活上堂十方梵剎事同一家量才補職買帽相頭衲僧家一日二時向長連牀上開單展鉢拈匙把筯缺箇什麼糊餅䬪飥糖糕餕餡乃尋常茶飯雖然如是且道杓柄在什人手裏若也知得一任恣意餐啜若也不知今日新請典座上堂拈拄杖云宮商角徵羽金木水火土卓一下云卦上吉凶分三日後看取上堂保寧尋常為人直下是無面目若也敲骨出髓直得神號鬼哭拍手笑云仁義盡從無處斷世情偏向有錢家上堂橫按杖云汝等大丈夫漢須是一刀兩段直下七縱八橫擲杖云且待天下人判斷問寒風凋敗葉猶喜故人歸未審誰是故人答楊岐遷化久矣僧云更有什麼人知音答無眼村公暗點頭僧云死柴頭有無煙火獨向應無人得知答今日未開爐僧云忽遇七縱八橫時如何答不如縮却手僧云誰知煙靄裏猶有釣魚翁答莫亂道師與李太博舉三句頌次博云祇是箇不了底公案師云試請太博斷看博云八棒十三師云保寧有什過博無語師云正是箇不了底公案上堂舉夜夜抱佛眠朝朝還共起起坐鎮相隨語默同居止分毫不相離如身影相似欲識佛去處祇者語聲是大衆傅大士此頌古今不墜一切人知向此瞥地者亦多錯會者不少玄沙云大小傅大士祇認得箇昭昭靈靈洞山聰云且道衲僧家日裏還曾睡也無此兩轉語誰言世上無仙客須信壺中別有天保寧亦有一頌要眠時即眠要起時即起水洗面皮光啜茶濕却觜大海紅塵生平地波濤起呵呵阿呵呵囉哩哩囉哩下座上堂衆集定良久云堪作箇什麼便下座上堂衆集定良久云猶較些子便下座上堂看看山僧入拔舌地獄去也以手拽舌云阿㖿阿㖿上堂森羅及萬像皆於鏡中現以杖指云北面是廚庫南面是僧堂中間是佛殿直下指云者裏是什麼乃云踏牀子也不識問如何是保寧境答主山頭倒卓進云如何是境中人答鼻孔無半邊問如何是保寧家風答硬糊餅爛䬪飥進云忽遇客來將何祗待答粗飱易飽細嚼難飢問如何是佛答自屎不覺臰上堂一是一二是二三是三四是四數目甚分明上下依資次依資次有何事以杖劃云大衆一時亂却六十甲子了也上堂行時行住時住坐時坐臥時臥舉手動步皆自由處處何時有蹉過自家肚皮自家劃粥飯但飧休忍餓阿呵呵記得麼今年十一月是小十二月是大上堂釋迦老子初生下時周行七步目顧四方當與麼時土曠人稀相逢者少遂以手指天地三家村裏東卜西卜便道天上天下唯我獨尊祖禰不了殃及子孫下座以手托禪牀召衆云三十年後不得錯舉上堂啞人唱聾子拍永夜風清月虗白燋磚打著連底凍天曉一輪光烜赫文殊普賢醉不知浡海新羅齊斫額阿呵呵作什麼從教屎坑裏坐深草裏臥水長船高泥多佛大公案現前一時領過以杖劃一劃下座上堂古人底今人用今人底古人為古今無背面今古幾人知㖿嗚咿一九與二九相逢不出手上堂無種靈苗火裏栽鐵華還向樹頭開驀然結箇團欒果指似時人處得來上堂無邊剎境自他不隔於毫端十世古今始終不離於當念豎窮三際橫遍十方理事圓融性相平等宮殿樓閣處處莊嚴草木山川重重顯露鐘鳴鼓響時時揚解脫之音文字語言句句盡真如之理離彼離此無是無非芥子納須彌未為分外百川歸大海乃是尋常都亡大小之名不見有無之相是故隱顯自在去住無方處凡不凡在聖不聖此不思議境界諸人常在其中為什却不自覺上堂侍者燒香罷師指侍者云侍者已為諸人說法了也遂下座上堂以兩手畫一圓相擘開捺膝云渾崙劈不破三人共兩箇滋味信全無有誰吞得過吞得過且與麼吞不過莫亂做上堂欲言言不及林下好商量且道作麼生商量時挑野菜和根煮旋斫生柴帶葉燒上堂賣扇老婆手遮日田公布袴不到膝斷頭船子任風飄昨夜籬頭吹篳𥷑上堂百川異流同歸於海萬塗差別皆入此宗卓拄杖云醫得眼下瘡剜却心頭肉上堂昨夜三更忽然大地震動直得須彌岌峇海水沸騰其中有無限衆生正在夢中不覺不知如存若亡卓拄杖云大衆還聞麼幾乎喪身失命解夏上堂秋風才動布袋頭開來者自來去者自去江淮兩浙足有家風衡嶽廬峯更多幽致驅驅轆轆劫劫波波須知道不動如來未嘗舉步且道不動步一句作麼生道良久云適來堂裏來却歸堂裏去一日上堂才出法堂大衆問訊便歸方丈上堂舉道遠乎哉觸事而真師云凉風明月青山白雲聖遠乎哉體之則神師云眉毛上踣跳眼睫裏藏身拍禪牀云遠親不如近鄰上堂從他謗任他非把火燒天徒自疲我聞恰似飲甘露消融頓入不思議大衆永嘉猶有者箇在真州資福上堂指座云資福法座行住坐臥快便難逢不得放過便升座衆立定師云會麼不解作客勞煩主人遂下座上堂上是天下是地南北東西各依本位保寧有時翻天作地翻地作天喚東作西喚南作北捩轉鼻孔換却髑髏衆中有同死同生者何妨出來大家出手有麼良久云當官莫近前作客莫落後上堂乾坤之內宇宙之閒中有一寶祕在形山且道是什寶非青黃赤白男女等相是何言歟雖然如是匹上不足匹下有餘上堂即此見聞非見聞無餘聲色可呈君箇中若了全無事體用無妨分不分保寧有時以拄杖作體有時以拄杖作用作體也乾坤寂爾世界坦然作用也秋變冬凋春生夏長不見道體中有用用中有體體不離用用不離體橫按杖云且道是體是用若到諸方莫道保寧四棱搨地上堂拈杖云此是雲門臨濟德山巖頭一生用不盡底如今在保寧手裏不直半分錢雖然如是又也可貴可賤且道什處是可貴可賤擲杖下座長蘆上堂未到者裏萬事不言既到者裏如何即是有口有舌何妨亂說有問話者出來再召無人師云猶較些子古資福云隔江見資福剎竿便回腳跟好與二十保寧昨日離金陵泛小舟渡大江到長蘆門下見剎竿觀佛殿上方丈禮拜祖印禪師蒙不賜罪責特加殷勤何故恩深轉無語懷抱自分明禪師又令對衆升座不免胡言漢語瞞諸人等是不識好惡更有一頌乘興安然泛小舟霎時風送到江頭不知相見談何事諸高德試道看上堂有手腳無背面明眼人看不見天左旋地右轉拍膝云西風一陳來落葉兩三片上堂古云文殊門入者牆壁瓦礫與汝發機觀音門入者蝦蟆蚯蚓與汝發機普賢門入者不動步遍十方大衆東西南北四維上下築著磕著不覺不知過在什處良久云紅粉易成端正女無錢難作好兒郎上堂黃面老子出世平地骨堆碧眼胡兒西來無風浪起近朱者赤近墨者黑臨濟雲門牽枝引蔓保寧也有沒量罪過諸人也有沒量罪過還委悉麼良久云面皺祇因陪笑得背跎還為打躬多參上堂不可以智知不可以識識言語道斷心行處滅保寧道亦可以智知亦可以識識言語不斷心行不滅何故青山祇解磨今古流水何曾洗是非上堂風鳴條雨破塊曉來枕上鶯聲碎蝦蟆蚯蚓一時鳴妙德空生都不會都不會三箇成羣四箇作隊窈窈窕窕飄飄颻颻向南北東西折得黎華李華一佩兩佩上堂時時舉處處說絶忌諱無閒歇橫按杖云會麼一夜落華雨滿城流水香卓一下下座歲旦上堂昨日去年去今日今年來去年去不去今年來不來遍野盈尺雪大地亡纖埃無名無字人舉目聊徘徊發化主上堂身披信施衣口喫信施食施者絶纖毫受者無蹤跡大施門正開百千及萬億信手拈將來切忌從他覓既不從他覓向信手處道將一句來有麼若無保寧自道去也一封書信通消息兩貼茶湯表信儀問彌勒真彌勒分身千百億時時示時人時人自不識和尚還識也無答不識僧云石牛頻吐三春霧木馬嘶聲滿道途答蹉過也不知僧云蹉過事作麼生師便喝僧合掌云真善知識答念你是舊維那問維摩展掌世界崢嶸善財彈指樓閣重重為復神通妙用本體如然答總不與麼僧云未審作麼生答水灑不著僧云兵隨印轉將逐符行答千里萬里僧云某甲祇與麼和尚又如何答你是行腳人僧云三十年後有人舉在師云記取問師登寶座四衆臨筵的的西來請垂舉唱答慢二急三僧云今日一會事不虗然答拍拍是令僧拍手云囉囉哩答也似箇知音僧云施主霑恩學人禮謝答風驚草動問向上之機即不問入垂手意如何答兩腳踏地僧云天人羣生類皆承此恩力答鼻孔遼天僧禮拜師云莫動著問如何是塵中自在底人答因行不妨掉臂問如何是佛法大意答鑊湯無冷處退院上堂百尺竿頭弄嶮𡾟是人平地為攢眉而今潦倒成無用高躡前蹤付與誰有道得者試道看良久云若無人道不如交與謝知府大衆畢復云江國名藍甲上游寅緣於此繼焚修幻軀已是多衰病雪髮將看遍滿頭浮世百年猶不足旋風千匝尚難周今朝喜作神仙客遂性逍遙得自由再授帖上堂拍手三下指口搖手三下下座市戶請上堂摩竭室不掩方丈門再開不惜眉毛者橫身請入來僧出拍手三下指口搖手三下云如何答猶較些子僧云盡開終始口爭奈有天何答被你勘破僧搖手三下歸衆答好箇仙陀問百尺竿頭弄嶮𡾟是人平地為攢眉如今眉已展如何是弄嶮𡾟底答一任拍手僧云翻身真箇有來由答自家看取僧云忽若撲落又作麼生答噁僧云也要大家知答人平不語水平不流僧云有意氣時添意氣師噓一聲問欲退名藍辭不得宗乘重唱時如何答葉落歸根僧云法輪再轉於閻浮道光重映於千載答春來依舊萌芽發僧云雨露垂恩羣情有賴答大地沒間人乃云三界六道輪回業鏡難藏好醜不須更滯他人盡是自作自受如今於諸人分上各自有一面業鏡子明歷歷地且道是好是醜試請回頭自照看又外道問世尊今日當說何法尊云說定法次日復問說何法尊云說不定法道云昨日為什定今日為什不定尊云昨日定今日不定諸仁者是知佛法無有定相無不定相隨機施設一切臨時說有亦得說無亦得說定亦得不定亦得猶如太空蕩蕩無礙一任穿鑿縱橫自在如今若有人問保寧今日當說何法即云說不定法或次日問說何法即云說定法或問昨日為什不定今日為什定即云昨日不定今日定或問昨日不定事作麼生即云未曾再謝知府在或問今日定底作麼生即云市戶已作茶筵了謝畢乃云引退潛藏志未從世閒何處可相容依前却入塵泥去物物頭頭露祖宗拍禪牀下座上堂釋迦老子四十九年說法不曾道著一字優波毱多丈室盈籌不曾度得一人達磨不居少室六祖不住曹溪誰是後昆誰為先覺彼自無瘡勿傷之也拍手大笑云且喜天下太平上堂萬物滋一雨生芽不離土甜瓜徹蒂甜苦瓠連根苦上堂從朝至暮橫說豎說其奈未嘗動著他一毫毛拈杖云委悉麼初三十一中九下七休問天岡河魁說甚大吉小吉劃一劃下座上堂拈拄杖子卓一下云何不說法卓二下云惺惺直是惺惺歷歷直是歷歷三十年後不得受人瞞卓三下下座上堂召衆以手指上指下云這箇是釋迦擎拳云這箇是迦葉合掌云這箇是阿難展兩手云這箇是什麼云羞慙殺人上堂舉靈雲見桃華悟道有頌云三十年來尋劍客幾回落葉幾抽枝自從一見桃華後直至如今更不疑玄沙聞云諦當甚諦當敢保老兄未徹在且道靈雲見什道理莫是悟得箇萬法不生不滅無去無來空寂之理麼若與麼何曾悟在祇如玄沙恁麼道為復是肯他不肯他若道肯他玄沙眼在什處若道不肯他靈雲過在什處衆中商量極多所以千聞不如一見保寧亦敢保諸人未徹在且聽一頌靈雲忽爾見桃華賴遇玄沙是作家此話古今應不墜任他雲水走天涯上堂舉雪峯云南山有條鱉鼻蛇汝等諸人好看長慶云今日堂中大有人喪身失命玄沙云用南山作麼雲門以杖攛向雪峰面前作怕勢師拈杖召衆云喪身失命了也下座上堂今朝十月一爐簇無煙火削髮披緇流競向爐邊坐霜清天乍寒水冷冰未鎖不知天上與人閒更有阿誰過似我拍手大笑下座上堂有箇漢怪復醜眼直鼻藍鑱面南看北斗解使日午金烏啼夜半鐵牛吼天地旋山河走羽族毛羣失所守直得文殊普賢出此沒彼七縱八橫千生萬受驀然逢著箇黃面瞿曇不惜眉毛再三與伊摩頂授記云善哉善哉大作佛事希有希有於是自家𢣾𢣾㦬㦬慞慞惶惶藏頭縮手大衆此話已行何待三十年後上堂天地與我同根萬法與我一體拈杖云渾家不管興亡事祇解和雲占洞庭上堂相見不揚眉君東我亦西紅霞穿碧海白日繞須彌保寧即不然不西不東觸處相逢耳輪卓朔頭髮鬅𩮀仰天大笑手指虗空作麼寒風颯颯細雨濛濛上堂震法雷擊法鼓布慈雲兮灑甘露法雷已震法鼓已擊慈雲靉靆甘露雱𩃱萬彚千靈悉霑其益其益既廣其功不宰為什不宰道泰不傳天子令時清休唱太平歌上堂大方無外大圓無內無內無外聖凡普會瓦礫生光須彌粉碎無量法門百千三昧拈杖云總在者裏會麼蘇嚕蘇嚕悉哩悉哩上堂真相無形示形顯相千怪萬狀自此而彰喜則滿面光生怒則雙眉陡豎非凡非聖或是或非人不可量天莫能測直下搆得未稱丈夫喚不回頭且莫錯怪上堂日可冷月可熱衆魔不能壞真說保寧即不然月可冷日可熱衆魔亦能壞真說作麼生是真說潮田種稻重收穀村路逢人半是僧上堂解語非干舌能言不是聲百骸俱潰散一物鎮長靈師彈指云大衆蒼天中更添怨苦上堂明頭來明頭打師拍手一下暗頭來暗頭打拍手一下四方八面來連架打拍手一下總不恁麼來時如何喝云笑殺傍觀上堂智不到處切忌道著道著即頭角生大衆頭角生了也是牛是馬炙茄齊上堂休說因緣不是時節匹馬單鎗翦釘截鐵僧問為善者讚莫能盡為惡者歎亦無窮祇如不為善不為惡者又作麼生答呌天不應叫地不聞僧云嶽陽樓子上大見使帆人答知音者少僧以坐具一劃師便喝僧亦喝師云蹉過也不知僧云相識滿天下答禮拜著僧應諾師便打問滿堂雲水客箇箇學無為未審無為如何學答教老僧向汝道什麼即得僧云一切賢聖皆以無為法為甚却有差別答青絹扇子沒風凉僧云大衆證明學人禮謝答禮謝即得問直截根源佛所印摘葉尋枝我不能尋枝摘葉即不問直截根源事若何答蚊子上鐵牛僧云直截根源今已曉中下之流如何指示答石人脊背汗通流僧云施主霑恩學人禮謝答三十年後此話大行乃云佛祖正令凡聖俱亡機智難明心境雙絶所以佛祖到者裏盡皆亡鋒結舌設有一言半句皆是為蛇畫足之談實際理中本無是事何謂只要諸人瞥地去不逐語言去返本還源去不涉岐路去踏破化城去截斷兩頭去歸家端坐去諸人何不向佛未出世時薦取祖師未來時薦取父母未生時薦取祇如父母未生時且自家作何面目委悉麼良久云團團古鏡無纖翳試請回頭一照看上堂昨夜泥牛哮吼今朝木馬奔騰築著嘉州石佛驚起少室胡僧胡僧當門齒缺開口向人怎說正月孟春猶寒未是仲夏毒熱上堂舉老宿到臨濟便問禮即是不禮即是濟便喝宿便拜濟云這賊宿云這賊便出濟云莫道無事好首座在邊立濟云且道還有過也無座云有濟云賓家有主家有座云俱有濟云過在什處座便出濟云莫道無事好後有僧舉似南泉泉云禍事僧云這賊泉云這賊便打大衆這一羣賊其中有正賊有草賊且道那箇是正賊那箇是草賊辨得麼口款易招贓物難認上堂大凡作與麼事開與麼口說與麼話須是與麼人始得祇如與麼人還甘與麼道也無搖手云低聲低聲上堂來無頭去無腳終日行踏不著既是終日行為什踏不著上堂夜夜靜悄悄日日閙浩浩夜夜與日日尋常向人道忙時急腳行困便和衣倒大衆不曉這箇事總是閒煩惱上堂橫身荷衆不顧危亡劄起布裙入泥入水分毫上定當升合裏論量拆東籬補西障若解與麼循塗守轍也可當風抵浪雖然如是猶未是咬猪狗底手腳作麼生是咬猪狗底手腳要會麼殺人不眨眼氣宇大於王上堂春種一粒穀秋收萬顆子四海無閒田農人猶餓死我沙門釋子修心務本五湖四海到處為家今日不愁明日飯生涯祇在鉢盂中雖然如是祇知有一不知有二何故不見道喫人美食憂人美事上堂君不見絶學無為閒道人作麼不除妄想不求真吽吽無明實性即佛性泥裏洗土幻化空身即法身矢上加尖祇者裏便回頭去已是拋家散業了也更若奔波向前其奈山重水遠上堂卓拄杖云佛殿走出三門燈籠跳入露柱百草頭頭放光說法如雲似雨擲下杖云咄咄下座上堂相罵無好言相打無好拳大衆直須恁麼始得一句句切害一拳拳著實忽然打著箇無面目漢也不妨暢快殺人上堂邪人說正法正法悉皆邪正人說邪法邪法悉皆正提起杖云是邪是正咄這裏是什所在說邪說正擲下云一任舉似諸方問緇素盡臨於座側請師方便振雷音答爭敢僧云和尚為什藏鋒相待答驚天動地也不知僧云一音師子吼何處覓狐蹤答頭上漫漫腳下漫漫僧云還許出身句也無答官不厭詐僧畫一圓相師便喝僧亦喝師亦畫一圓相僧以坐具一劃師云三十年後不得錯舉僧云惱亂春風卒未休答少賣弄問湛寂之機即不問入鄽垂手事如何答為蛇畫足人無數僧云夜來寒風生八極今朝流水漲前溪答六祖不識字僧畫半月相云且道是什麼答老僧不識僧便喝答且莫虗頭僧云三十年後答放一線道冬至僧問檀那瞻仰海衆雲臻向上宗乘請師舉唱答今年天子拜南郊僧云一人有慶兆民賴之答金雞放大赦僧云未審某甲有分不答莫道不承恩僧云便與麼去時如何答靈利人難得問去載今朝長至節今年猶是去年年二輪交互常流動到此如何論不遷答天寒日短僧云為什改故換新答冬深多雨雪必定是豐年僧云野火燒不盡春風吹又生答有什了時僧云點點是秋聲答終不落別處僧以坐具一拂師噓一聲上堂一月普現一切水一切水月一月攝諸佛法身入我性我性同共如來合舉頭觸著威音頭下足踏著彌勒足拈匙把筯現千百億化身換水添香作恆河沙佛事既非妙用豈是神通理無不圓事無不備若也悟得誰家竈裏無煙儻或未然病是衆生良藥上堂不壞假名而談實相拈杖云這箇是假名阿那箇是實相卓一下云這箇是實相阿那箇是假名有眼底近前無眼底退後上堂呵佛罵祖無慚無愧法說非法非法說法具大闡提撥無因果且道此人是邪是正良久云邪即總邪正即總正上堂來也來也良久云去也去也上堂久默斯要不務速說召衆云誰人肯向死前休上堂腳瘦草鞋寬髮長僧貌醜召衆云突出兩箇鬼眼睛更有一雙窮相手上堂金不博金水不洗水楊岐老古錐思量無道理無道理打落當門齒上堂將經寺裏談擔水河頭賣都來不直一分文羞殺黃頭箇新戒上堂古人道衲僧家須是與他本分草料始得且作麼生是衲僧本分草料良久云一日三頓未為多上堂圓同太虗無缺無餘良由取捨所以不如古人恁麼道直是光前絶後雖然如是未免強陪分踈上堂我見瞞人漢如籃盛水走一氣歸到家籃裏何曾有拍手大笑云有意氣時添意氣不風流處也風流上堂不思議解脫力妙用恆沙也無極卓杖一下云吞却法身了也諸人向什處回避若也道得萬仞崖前有活身之路若道不得大地死人如麻似粟卓一下下座上堂平直道路敲磕門庭總被他古人縱橫履踐了也教保寧向什處措足委悉麼江山行不盡雨雪下無時上堂或是或非人不識逆行順行天莫測大衆是箇什麼便得恁麼良久云有金有玉同歡笑無米無柴各皺眉上堂保寧記得三十年前一轉奇特公案欲舉似大衆及至下得法堂和話頭都來忘却還有人記得麼試舉看衆無對師云江南極有江北絶無上堂一㪷量不盡一稱稱得起半箇却完全有頭自無尾且道是什麼物上堂保寧飯食粗惡別無精妙品饌供養諸人既到這裏開單展鉢須是喫得這箇無滋味始得若喫不得且莫怪上堂拈杖云長千聖不能量短蟭螟眼裏著不滿卓一下云夜來江上雨分作萬家流上堂是箇什麼得與麼難會是箇什麼得與麼易曉委悉麼不是怨家不聚頭上堂欲入無為海須乘般若舟拈杖云這箇是無為海阿那箇是般若舟擲下杖云善看方便切忌飄墮羅剎鬼國上堂瑞雪下殘臘和風生早春空將未歸意說向欲行人未歸意絶忌諱欲行人何疏親繞須彌山轉百千匝不知畢竟向什處藏身拍禪牀下座上堂赤肉團上無位真人左眼八兩右眼半斤貴買賤賣黃金白銀上堂我有一張口內含三寸舌牙齒總完全是非無不說趙州木佛放光明少室鐵牛雙角折拍禪牀下座上堂舉趙州臨順世令僧馳拂子傳語趙王云此是老僧一生用不盡底乃云趙州一生用不盡底終不錯分付雖然不錯分付爭奈趙王提不起乃拈杖云此是保寧一生用不盡底不如未死已前兩手平等分付與諸人擲下杖拍手云阿喇喇三十年後莫教失却上堂春色秀媚春日光輝萬姓歌歡百禽叫噪處處草鋪茵褥家家門簇青紅樓臺殿閣勢崢嶸酒肆茶坊分屈曲無論士女選甚兒郎兩兩三三行行行唱或𢹂華微笑或折柳攢眉這畔搖頭那邊拍手作癡作呆似顛似狂忽若被人冷覷著大好一場笑具上堂保寧一夏臥疾已來向方丈裏撒屎撒尿狂言寐語直是東西不辨南北不分求生不生求死不死當恁麼時還有人相救得麼若有向什處著力若無保寧自起自倒去也拍禪牀下座上堂不見一法即如來方得名為觀自在觀自在在什處了即業障本來空了箇什麼未了還須償夙債未了箇什麼若向這裏透得過不妨平地上東行西行若透不過天網疏而不漏上堂無漏真淨云何是中更容他物喝一喝拍一拍云好人不肯做須要屎裏臥上堂見見之時見非是見見猶離見見不能及卓杖云還見麼落霞與孤鶩齊飛秋水共長天一色上堂佛道長遠久受勤苦乃可得成有人不受勤苦不涉久近不作衆生亦不成佛且道此人還得究竟也未良久云莫屈滯他好上堂不可毀不可讚體若虗空沒涯岸不離當處常湛然覓即知君不可見還見麼知事少時煩惱少識人多處是非多上堂說得行不得是阿誰行得說不得也大奇一步一彈指一劄一皺眉拍禪牀召衆云紫旃檀塔七八級紅菡萏華三四枝上堂洞山云五臺山頂雲蒸飯佛殿前頭狗尿天剎竿頭上煎椎子三箇猢猻夜簸錢石霜云風吹石臼曾哮吼泥揑夜叉空裏走躍翻海月亂波生驚起土星犯南斗道吾云三面貍奴手捉月兩頭白牯腳拏煙戴冠碧兔立庭柏脫殼烏龜飛上天師云此三頌一與祖佛為師一驗衲僧眼目一與天下人作榜㨾若人定當得許具一隻眼上堂古佛家風隨時展演衲僧活計在處施張鋤地開田刈禾割草燒火擇菜擔水搬柴沽醋買油乞錢持鉢把船搖櫓拽石推車八萬細行莊嚴三千軌儀具足轉法輪於𣜂榼堆上揚密旨於微塵剎中十地菩薩盡茫然四果聲聞都罔措橫按杖云還有人道得麼衆無語師云堪出手時須出手得藏身處且藏身卓一下下座上堂許由洗耳賣弄清高巢父飲牛謾張意氣太公垂釣終是有心范蠡泛湖焉能絶跡直得君臣道合河海晏清風不鳴條雨不破塊爭似三月野華隨處發九秋黃葉滿空飛狂歌向碧洞之前大醉在玉壺之裏拍手大笑云還知麼昨日是季秋霜冷今日是孟冬薄寒上堂夜靜月明水清魚現金鈎一擲何處尋蹤提起杖云歷細歷細上堂有物先天地無形本寂寥能為萬象主不逐四時凋拈杖云且莫喚這箇作拄杖子好壽寧長老進發上堂曹溪一宿也大無端黃檗三頓遞相鈍置蒲團禪板屈抑當人索火來燒猶較些子保寧今日別無相送壽寧長老拈杖云祇有一條黑漆拄杖更不囊藏向大衆前兩手分付擲杖下座上堂大丈夫眉目粗東西南北何所拘氣衝宇宙坐斷毗盧又說什西來碧眼胡上堂吾心似秋月碧潭光皎潔無物堪比倫教我如何說寒山子貴價精神賤價賣子細思量著甚來由雖然如是三十年後有人點撿保寧去在上堂業鏡當臺賊身已露既是贓物現在為甚不肯招伏會麼朝打三千暮打八百出歸上堂霜風浩浩葉紛紛曉入深村野老門相見但知俱默坐更無一事可談論良久云入山擒虎易開口向人難上堂兩手捺膝云赤肉團上壁立千仞喝一喝下座頌古世尊初生下時周行七步目顧四方一手指天一手指地云天上天下唯我獨尊混沌未分人未曉乾坤才剖事潛彰天生伎倆能奇怪末上輸他弄一場外道問佛不問有言不問無言世尊據坐外道禮拜讚歎云世尊大慈大悲開我迷雲令我得入外道去後阿難問佛外道見何道理禮拜讚歎而去尊云如良馬見鞭影而行經過遇夜宿荒草開得眼來天大曉空心赤腳唱歌歸路上行人已不少五通仙人問世尊我有五通佛有六通如何是那一通世尊乃召五通仙人仙人應諾世尊云那一通你問我無量劫來曾未遇如何不動到其中莫言佛法無多子最苦瞿曇那一通世尊一日在靈山會上拈華示衆迦葉微笑尊云吾有正法眼藏付囑摩訶迦葉汝今行化無令斷絶拈華我佛在靈山迦葉頭陀忽破顏金口密言親付囑不唯天上與人閒文殊令善財入山採藥殊云不是藥者採將來財云山中無不是藥者殊云是藥者採將來財於地上拾得一莖草度與文殊殊接得示衆云此藥亦能殺人亦能活人大地蒼生病似麻吉祥靈藥示無涯其閒殺活難分辨又是重添眼裏華阿難問迦葉世尊傳金襴外別傳何物葉召阿難難應諾葉云倒却門前剎竿著象王行處絶狐蹤象子雄雄繼此風休說二千年後事縱塵沙劫又何窮阿育王問賓頭盧云承聞尊者親見佛來是不者以兩手撥開眉云親見佛來我佛親見賓頭盧眉長髮短雙目粗阿育王猶疑狐唵嚤呢噠哩㗭哩囌嚧梁武帝問達磨如何是聖諦第一義磨云廓然無聖帝云對朕者誰磨云不識燒得通紅打一鎚周遭無數火星飛十成好箇金剛鑽攤向門前賣與誰達磨一日云吾住世非久誰得吾正宗者出來與汝證明道副云如我所見不執文字不離文字以為道用磨云汝得吾皮尼總持云我今所解如慶喜觀阿閦佛國一見更不再見磨云汝得吾肉道育云四大本空五陰非有而我見處實無一法可當情磨云汝得吾骨二祖出禮三拜依位而立磨云汝得吾髓門前諸子列成行各逞英雄越霸王如何獨有無言者坐斷毗盧不可當六祖見二僧爭風幡一云風動一云幡動祖云不是風動不是幡動蕩蕩一條官驛路晨昏曾不禁人行渾家不是不進步無奈當門荊棘生六祖問讓和尚甚處來讓云嵩山祖云什麼物恁麼來讓云說似一物即不中祖云還假修證不讓云修證即不無汙染即不得祖云即此不汙染是諸佛所護念吾亦如是汝亦如是西天二十七祖般若多羅讖汝後出一馬駒踏殺天下人去在戴角披毛恁麼來鐵圍山嶽盡衝開閻浮踏殺人無數驀鼻深穿拽不回法華經云大通智勝佛十劫坐道場佛法不現前不得成佛道三際斷時凡聖盡十身圓處剎塵周無私應物隨高下末過僧祇大劫修維摩云其施汝者不名福田供養汝者墮三惡道無邊無際休斟酌潮去潮來本自平清濁淺深并苦淡一般滋味迥分明金剛經云一切賢聖皆以無為法而有差別仁者見之謂之仁智者見之謂之智寒時向火熱乘凉健即經行困打睡困打睡仰面看天開口取氣清淨行者不入涅槃破戒比丘不入地獄生平疏逸無拘撿酒肆茶坊信意遊漢地不收秦不管又騎驢子過揚州思和尚令石頭往南嶽讓和尚處馳書云回來與汝箇鈯斧子住菴頭乃往讓處便問不求諸聖不重己靈時如何讓云子問太高生何不向下問頭云寧可永劫沈淪不求諸聖解脫乃回思云子馳書達不頭云書亦不通信亦不達昨蒙和尚許鈯斧子住菴即今便請思垂下一足頭便禮拜從來祖上作君王子子孫孫代代昌文武百僚都不識祇應金殿有尊堂馬祖坐禪讓問坐禪擬作什麼祖云擬作佛讓休去至來日讓却以甎對祖石上磨祖問磨甎擬作什麼讓云擬作鏡祖云磨甎豈得作鏡讓云磨甎若不作鏡坐禪豈得作佛祖云畢竟教某甲如何讓云譬如以牛駕車車若不行打車是打牛是祖遂省死馬醫來無用處車牛腦後更加鞭皮穿肉綻還知不任重應須角力全百丈再參馬祖祖見來乃指禪牀角拂子丈云即此用離此用祖云你已後開兩片皮將何為人丈取拂子豎起祖云即此用離此用丈挂拂子於舊處祖喝一聲丈直得三日耳聾木馬踏殺閻浮人泥龍飲竭滄溟水霹靂滿空山嶽摧看看平地波濤起龐居士問馬祖不與萬法為侶者是什人祖云待你一口吸盡西江水即向你道風吹日炙露尸骸泣問山人覓地埋忍俊不禁多口老陰陽無處可安排龐居士問馬祖不昧本來身請師高著眼祖直下覷士云一種沒絃琴唯師彈得妙祖直上覷士禮拜祖歸方丈士隨後云弄巧成拙浩浩擎山戴嶽來撐天拄地勢崔嵬從教弄巧翻成拙撒手前行更不回馬祖不安院主問和尚近日尊候如何祖云日面佛月面佛蒲團上端坐針眼裏穿線西風一陳來落葉兩三片僧問百丈如何是奇特事丈云獨坐大雄峰大雄峰頂獨巍巍直下橫分八字眉賴得縮頭知進退未嘗容易敢相虧百丈一日云閉却咽喉脣吻速道將來溈山云某甲道不得却請和尚道丈云不辭為你道恐後喪我兒孫雲巖云和尚亦須閉却丈云無人處斫額望汝五峰云即今有也未丈云喪我兒孫三箇兒郎總長成大家將本各經營其閒消折兄嫌弟也有贏錢弟怨兄溈山參百丈丈云子試撥火看山遂於爐內撥云無也丈自撥起一星云者箇聻山遂省明日隨百丈遊山丈回顧云子將得火來麼山云將得來丈云在什處山於地上拾得一莖柴以口一吹度與丈丈云如蟲禦木提起都來祇一星豁然騰𦦨亘天明連延野外猶難救直得三年草不生南泉云喚作如如早是變也今時人須向異類中行始得趙州在僧堂前見泉便問異即不問如何是類泉以手托地州以腳踏泉倒地州走入延壽堂叫悔泉令侍者問悔什麼州云悔不更與兩踏張公移住向深村被賊潛身入後門鍋子一時偷去後更來敲枕玩兒孫南泉云王老師賣身去還有人買麼僧出云某甲買泉云不作貴不作賤作麼生買僧無語趙州云來年與和尚做一領布衫王老哀哉不惜身臨危將賣與何人若無令子輕酬價往往一年空過春南泉兩堂上座爭猫兒泉拈起猫云道得即救取道不得即斬為兩段衆無語泉便斬雪刃含光射斗牛不唯天地鬼神愁命根落在南泉手直下看看兩段休趙州至晚到方丈泉舉前話州脫鞋戴頭上出去泉云子若在却救得猫兒貍奴頭上角重生王老門前獨夜行天曉不知何處去楚山無限謾崢嶸僧問南泉端居丈室將何指南泉云昨夜三更失却牛天明起來失却火昨夜三更失却牛天明起來失却火腰未繫兮鞋未穿面不洗兮頭不褁南泉云道非物外物外非道趙州出問如何是物外道泉便打州接住云和尚莫打某甲已後錯打人去在泉擲杖云龍蛇易辨衲子難瞞軟纏藏鋒入陳來畫時擒下眼瞪開死生一決英雄士文武雙行將相才趙州問南泉明頭合暗頭合泉便歸方丈州到僧堂前云堂頭老漢被我一問直得無言可對首座云莫道和尚無語自是上座不會州便掌云這掌本是堂頭老漢喫大事當陽已皎然十分須是更周圓堂中上座黑如漆冷地為誰喫暗拳趙州問南泉知有底人向什處去泉云山下檀越家作一頭水牯牛去州云謝師指示泉云昨夜三更月到窗拽脫鼻頭何處是亂拖泥水恣縱橫日斜倒坐騎歸去又見東山片月生南泉歸宗麻谷同去禮拜國師泉於地上畫圓相云道得即去宗於相內坐谷作女人拜泉云恁麼則不去也宗云老兄是何心行漫漫大地盈尺雪江湖一片難分別漁父披蓑月下歸誰道夜行人路絶石頭問長髭甚處來髭云嶺南來頭云大庾嶺頭一鋪功德成就也未髭云成就久矣祇缺點眼在頭云莫要點眼不髭云便請頭垂下一足髭便拜頭云子見什道理便拜髭云紅爐上一點雪一鋪大悲千手眼十分圓就未開光君看筆下神通境更有靈蹤在上方道吾雲巖高沙彌隨藥山遊山山指枯樹云榮者是枯者是吾云榮者是山云灼然一切處光明燦爛去巖云枯者是山云灼然一切處枯淡去高沙彌云榮者任他榮枯者任他枯山顧道吾雲巖云不是不是抹粉塗坯復裹頭盡由行主線牽抽鼓鼙打破曲吹徹收拾大家歸去休藥山不許人看經乃自看僧問和尚常不許人看經為什自看山云我祇要遮眼僧云某甲還看得也無山云你若看牛皮也須穿遮眼誰同藥嶠看牛皮穿透骨毛寒五湖四海知多少字密行疏總一般陸亘大夫謂南泉云肇法師也奇怪解道天地與我同根萬法與我一體泉指庭華云大夫時人見這一株華如夢相似大夫作牧見南泉舉古明今理事圓恰到放將身命處不知何故却茫然裴相公一日托尊佛跪膝於黃檗前云請師安名檗召相公公云謝師安名五彩粧來掌上擎老胡剛為立虗名君今欲得超諸祖須向金剛頂𩕳行溈山寄鏡與仰山山接得示衆云道是溈山底又在仰山手裏道是仰山底又是溈山寄來道得即留取道不得即撲破衆無語遂撲下溈山古鏡仰山提日上東方月照西撲落不知誰拾得秋風索索草萋萋溈山云老僧百年後向山下檀越家作一頭水牯牛去脅上書溈山僧某甲當恁麼時喚作溈山僧又是水牯牛喚作水牯牛又是溈山僧且道如何即是改却形容換却頭當陽難隱箇蹤由驢名馬字雖呼喚多少傍觀掩面羞溈山與仰山摘茶次溈云終日祇聞子聲不見子形仰撼茶樹溈云子祇得其用不得其體仰云某甲祇如是和尚作麼生溈據坐仰云和尚祇得其體不得其用溈云放子三十棒春暖相呼出翠微時行時坐幾忘歸黃昏一陳東風雨未免渾身透濕衣溈山問仰山甚處來仰云田中來溈云田中多少人仰山插鍬叉手立溈云今日南山大有人刈茅仰山拽鍬便去淺種深耕正及時入泥入水更同誰南山茅草多人刈獨是爺兒兩箇知溈山令僧馳書上王常侍侍看書了乃問和尚近日有何言句僧云有僧問如何是祖師西來意溈山豎起拂子侍云彼中如何商量僧云即色明心附物顯理侍云會即便會著甚死急侍遂有書回書內畫圓相相內書日字溈接得拆開示其僧云會麼僧云不會溈云我千里外却有箇知音仰山上來溈山展似仰山仰山於地上畫圓相相內書日字以腳抹却溈休去南星北斗忽移位四海九州如鼎沸波斯匿王鼻拄天樓至如來腳踏地僧持錫到章敬繞禪牀三匝振錫一下叉手而立敬云是是僧便去次到南泉繞禪牀三匝振錫一下叉手而立泉云不是不是僧云章敬道是和尚為什道不是泉云章敬是汝不是顏色規模恰似真人前拈弄越光新及乎入火重烹試到了須歸是假銀韓愈侍郎問大巔春秋多少巔提起數珠云會麼韓云不會巔云晝夜一百八明日復來門首見首座云晝夜一百八意旨如何座扣齒三下及至方丈問大巔晝夜一百八意旨如何巔亦扣齒三下韓云元來佛法不別巔云侍郎見何道理韓云適來門首問首座亦恁祗對巔請首座至云適來恁麼祗對是不座云是巔乃打趁出院一步才行兩步移門前驚起鳳皇兒棲蹤不在梧桐樹羣鳥東西空繞枝龐居士問仰山久響仰山到來為什却覆山豎起拂子士云恰是山云是仰是覆士拍露柱云雖無人見露柱與我證明山擲拂子云一任舉似諸方賊偷賊物大希奇好手還他火伴知今日并贓齊捉獲得便宜是落便宜僧問石霜咫尺之間為什不覩師顏霜云我道遍界不曾藏僧後問雪峰遍界不曾藏意旨如何峰云什處不是石霜雙眸自小患生盲兩耳從前祇聽聲指點萬端都不見如何彈指得分明僧問石霜普會如何是石霜深深處霜云無鬚鎖子兩頭搖無鬚鎖子卒難開枯木堂前莫亂猜千古兩頭搖不動待他麟角衲僧來臨濟在黃檗會中時睦州為首座知濟是法器乃令上方丈問佛法大意三問三被打州見云子去問佛法如何濟遂舉前話云某緣法不在此不免取辭且往他處去州上方丈囑檗云義玄上座雖是後生甚奇怪他日為陰凉大樹蓋覆天下人去在若來可方便至晚濟上取辭檗云可往高安大愚處去濟去愚問甚處來濟云黃檗來愚云黃檗近日有何言句濟舉前話云未審某甲過在什處愚云黃檗恁麼老婆為你得徹困却來這裏問有過無過濟失聲云元來黃檗佛法無多子愚攔胸搊住云者尿牀鬼子適來問有過無過如今却道無多子見何道理速道速道濟於愚脅下築三拳愚托開云汝師黃檗非干我事雷電喧轟海嶽昏一家愁閉雨中門狂風忽起烏雲散白日滿天星斗分臨濟云赤肉團上有一無位真人常在諸人面門出入未證據者看看時有僧問如何是無位真人濟下禪牀搊住云道道僧擬議濟托開云是什麼簸土揚塵沒處藏面門出入大狼當撒尿撒屎渾閒事浩浩誰分臰與香臨濟遷化三聖為院主濟云吾去世後不得滅却吾正法眼藏聖云爭敢濟云忽有人問你作麼生道聖便喝濟云誰知吾正法眼藏向者瞎驢邊滅却遂有頌云㳂流不止問如何真照無邊說似他離相離名人不稟吹毛用了急還磨出門握手再叮嚀往往事從叮囑生路遠夜長休點火大家吹殺暗中行德山初到龍潭問久嚮龍潭及乎到來潭又不見龍又不現潭云子親到龍潭浩渺深沈納衆流謾持香餌擲金鈎風雲合匝雷霆動應訝龍王不出頭德山至夜入室潭云子且下去山珍重出見黑回云外面黑潭點紙燭度與山才接潭便吹殺德山不覺失聲云我自今已後更不疑天下老和尚舌頭一條瀑布巖前落半夜金烏掌上明大口開來添意氣與誰天下共橫行雪峯問德山從上宗乘中事學人還有分也無山便打云道什麼峰遂省此疾懷來沒量時尋醫求卜過多師濃煎一服通神散血汗雱流徹四肢閩帥造送銀交椅與雪峰僧問和尚受如此供養將何報答峰以手托地云輕打我輕打我不知將甚報君恩風起江湖水皺痕一片古帆乘興去與誰相逐過天門閩大王封柑橘二顆上雪峰問云既是一般顏色為什名字不同峰遂封回閩主兩般馳獻上雪峰一等倒封回人情上下俱周美免把完全更擘開雪峰指火云三世諸佛盡在火𦦨裏轉大法輪雲門云火焰為三世諸佛說法三世諸佛立地聽一堆猛焰貫天紅三世如來在此中轉大法輪今已了眉毛之上起清風雪峰指獼猴云人人盡有一面古鏡這獼猴亦有一面古鏡僧云歷劫無明因什標為古鏡峰云瑕生也堪笑山翁不識羞為他頭上更安頭巖前跳躑無尋處一片殘霞曉未收僧問雲門不起一念還有過也無門云須彌山萬仞峰頭立大乖須臾眨眼落懸崖通身不損毫毛者天上人間安敢埋僧問洞山三身中阿那身不墮衆數山云吾常於此切僧問曹山吾常於此切意旨如何曹云要頭即斬取去此切堪傷走外求至親何故似冤讎始終滿面無慙色更有曹山乞你頭別古師別慶云這瞎漢終是難容雪峰云世界闊一尺古鏡闊一尺世界闊一丈古鏡闊一丈玄沙指火爐云這箇闊多少峰云如古鏡闊師別峰云若不是吾洎被子惑代古劉鐵磨到溈山山云老牸牛汝來也磨云來日臺山有齊和尚還去不山放身作臥勢師代磨云請和尚來日早起僧問魯祖如何是不言言祖云汝還有口麼僧云無祖云尋常將什麼喫飯僧無對師代僧云和尚不妨具眼
