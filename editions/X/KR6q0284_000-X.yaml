body:
  text: 金陵保寧禪院勇禪師語錄序鳳臺山老南方遊行時至楊朱泣岐處遇一善知識白雪蒙頭師子踞坐以金圈栗棘為佛事布施十方學者云鐵圍山可透吾金剛圈不可透大海水可吞吾栗棘蓬不可吞若透一圈即百千萬億圈透之無疑一切煩惱於此解脫若吞一蓬則百千萬億蓬吞之不疑一切功德於此成就時諸比丘罔然退席莫知所措彼上人者從容道場獨蒙授記後十五年鳳臺山頂震大雷音三草二木均霑一雨其徒錄其語請無為子以序之云耳時皇宋元豐元年清明日無為子楊傑述開堂疏龍圖閣學士給事中知軍府兼本路兵馬鈐轄王贄撰伏以西竺真風南宗密印一言悟道猶成藥病之差三界唯心舉有色空之別然而設喻筏而導初地破迷雲而證了因非假師承曷臻壺極所以維摩居士啟不二門迦陵仙音徧大千界今禪師勇公孤雲雅尚皓月素規電影掣乎迅機珠光圓於具戒四大非我靡流翠竹之形五蘊皆空豈滯華巾之結屬寶坊之虗次奉使移之舉能命震潮音庸安海眾猊座中設鼉鼓載揚傒悲海之宣猷俾含生之蒙益聖風倡熾祖葉敷芬成是勝緣綿乎不朽謹疏
